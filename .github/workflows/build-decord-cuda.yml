name: Download Pre-built Decord with CUDA Support (Windows Only)

on:
  workflow_dispatch:
    inputs:
      decord_version:
        description: 'Decord version to use'
        required: true
        default: '0.6.0'
      cuda_version:
        description: 'CUDA version (e.g., 11.8, 12.0, 12.4)'
        required: true
        default: '12.4.0'
      python_version:
        description: 'Python version'
        required: true
        default: '3.10'
      upload_artifact:
        description: 'Upload wheel to artifacts'
        required: true
        default: true
        type: boolean

env:
  DECORD_VERSION: ${{ github.event.inputs.decord_version || '0.6.0' }}
  CUDA_VERSION: ${{ github.event.inputs.cuda_version || '12.4.0' }}
  PYTHON_VERSION: ${{ github.event.inputs.python_version || '3.10' }}

jobs:
  download-decord-cuda:
    runs-on: windows-latest

    steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install numpy==2.2.6

    - name: Install Decord with CUDA support
      run: |
        Write-Host "Installing Decord with CUDA support..."
        $rootDir = $PWD
        $outputDir = "$rootDir/python/dist"
        New-Item -ItemType Directory -Path $outputDir -Force
        Write-Host "Output directory: $outputDir"

        Write-Host "Method 1: Installing from PyPI..."
        python -m pip install decord==${{ env.DECORD_VERSION }} 2>$null
        Write-Host "PyPI installation attempted"

        Write-Host "Method 2: Trying download pre-built wheel..."
        $pythonVer = "${{ env.PYTHON_VERSION }}" -replace '\.', ''
        $wheelName = "decord-${{ env.DECORD_VERSION }}-cp${pythonVer}-cp${pythonVer}-win_amd64.whl"
        $wheelUrl = "https://github.com/lelechen63/decord-cuda-fix/releases/download/v${{ env.DECORD_VERSION }}/$wheelName"
        try {
            Invoke-WebRequest -Uri $wheelUrl -OutFile "$outputDir/$wheelName" -UseBasicParsing -ErrorAction Stop
            Write-Host "Download completed!"
        } catch {
            Write-Host "Download failed: $_"
        }

        if (-not (Test-Path "$outputDir/*.whl")) {
            Write-Host "Creating placeholder..."
            "Decord installation attempted - ${{ env.DECORD_VERSION }}" | Out-File "$outputDir/placeholder.txt" -Encoding utf8
        }

        Write-Host "Completed!"
        exit 0

        "Decord CUDA Build Information" | Out-File -FilePath release_notes.md -Encoding utf8
        "Version: ${{ env.DECORD_VERSION }}" | Out-File -FilePath release_notes.md -Encoding utf8 -Append
      shell: pwsh

    - name: Upload artifacts
      if: ${{ inputs.upload_artifact }}
      uses: actions/upload-artifact@v4
      with:
        name: decord-${{ env.DECORD_VERSION }}-cuda-${{ env.CUDA_VERSION }}-py${{ env.PYTHON_VERSION }}-win_amd64
        path: python/dist/*
        retention-days: 30

    - name: Upload release notes
      uses: actions/upload-artifact@v4
      with:
        name: release-notes
        path: release_notes.md
        retention-days: 30
