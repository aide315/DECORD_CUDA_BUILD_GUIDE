name: Build Decord with CUDA Support (Windows Only)

on:
  workflow_dispatch:
    inputs:
      decord_version:
        description: 'Decord version to build'
        required: true
        default: '0.6.0'
      cuda_version:
        description: 'CUDA version (e.g., 11.8, 12.0, 12.4)'
        required: true
        default: '12.4.0'
      python_version:
        description: 'Python version'
        required: true
        default: '3.10'
      upload_artifact:
        description: 'Upload wheel to artifacts'
        required: true
        default: true
        type: boolean

env:
  DECORD_VERSION: ${{ github.event.inputs.decord_version || '0.6.0' }}
  CUDA_VERSION: ${{ github.event.inputs.cuda_version || '12.4.0' }}
  PYTHON_VERSION: ${{ github.event.inputs.python_version || '3.10' }}

jobs:
  build-windows-cuda:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Decord repository
      uses: actions/checkout@v4
      with:
        repository: dmlc/decord
        ref: v${{ env.DECORD_VERSION }}
        submodules: recursive
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Setup CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.19
      id: cuda-toolkit
      with:
        cuda: ${{ env.CUDA_VERSION }}
        method: 'network'
        sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust"]'
    
    - name: Install FFmpeg (via vcpkg)
      run: |
        # 安装 vcpkg
        if (!(Test-Path "C:\vcpkg")) {
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
        }
        cd C:\vcpkg
        .\bootstrap-vcpkg.bat
        
        # 安装 FFmpeg
        .\vcpkg install ffmpeg:x64-windows
        
        # 设置 FFmpeg 路径（使用正斜杠，避免转义问题）
        Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_ROOT=C:/vcpkg/installed/x64-windows"
        Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_INCLUDE_DIR=C:/vcpkg/installed/x64-windows/include"
        Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_LIB_DIR=C:/vcpkg/installed/x64-windows/lib"

        # 基础校验，提前失败，避免后续 CMake 报迷惑错误
        if (!(Test-Path "C:/vcpkg/installed/x64-windows/lib/avcodec.lib")) {
          throw "FFmpeg libs not found under C:/vcpkg/installed/x64-windows/lib"
        }
      shell: pwsh
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 使用 CMake 3.28 版本，避免 FindCUDA.cmake 的路径转义 bug
        python -m pip install cmake==3.28.0
        python -m pip install numpy wheel setuptools ninja pkgconfig
        python -m pip install numpy==2.2.6
    
    - name: Setup Visual Studio Environment
      run: |
        # 获取 Visual Studio 安装路径
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
        Write-Host "Visual Studio Path: $vsPath"
        
        # 设置 VC 编译器路径
        $vcPath = Join-Path $vsPath "VC\Tools\MSVC"
        $msvcVersion = (Get-ChildItem $vcPath | Sort-Object Name -Descending | Select-Object -First 1).Name
        $clPath = Join-Path $vcPath "$msvcVersion\bin\Hostx64\x64"
        
        # 获取 Windows SDK 路径
        $sdkPath = Join-Path $vsPath "VC\Tools\MSVC\$msvcVersion\bin\10.0.19041.0\x64"
        if (Test-Path $sdkPath) {
          Write-Host "Windows SDK Path: $sdkPath"
          echo "$sdkPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        }
        
        # 使用 vcvarsall.bat 设置完整环境
        $vcvarsallPath = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
        if (Test-Path $vcvarsallPath) {
          Write-Host "Found vcvarsall.bat: $vcvarsallPath"
          # 运行 vcvarsall.bat 并捕获环境变量
          cmd /c "call `"$vcvarsallPath`" x64 && set" | ForEach-Object {
            if ($_ -match "^(.*?)=(.*)$") {
              $name = $matches[1]
              $value = $matches[2]
              if ($name -match "^(PATH|INCLUDE|LIB|LIBPATH)$") {
                Write-Host "Setting $name = $value"
                echo "$name=$value" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              }
            }
          }
        }
        
        # 添加到 PATH
        Write-Host "Adding VC compiler to PATH: $clPath"
        echo "$clPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
        # 设置环境变量
        echo "VCINSTALLDIR=$vsPath\VC" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      shell: pwsh
    
    - name: Add CUDA to PATH
      run: |
        $cudaPath = "${{ steps.cuda-toolkit.outputs.CUDA_PATH }}"
        $cudaBin = Join-Path $cudaPath "bin"
        Write-Host "Adding CUDA to PATH: $cudaBin"
        echo "$cudaBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "CUDA_PATH=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CUDA_HOME=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      shell: pwsh
    
    - name: Configure CMake with CUDA (Ninja - Manual Config)
      run: |
        mkdir build
        cd build
        Write-Host "Configuring CMake with CUDA using Ninja (manual configuration)..."
        Write-Host "CUDA Path: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}"
        
        # 设置 FFmpeg 路径（使用正斜杠）
        $ffmpegRoot = "C:/vcpkg/installed/x64-windows"
        $ffmpegInclude = "$ffmpegRoot/include"
        $ffmpegLib = "$ffmpegRoot/lib"
        
        # 删除 vcpkg 的 FindCUDA 钩子和 CMake 自带的 FindCUDA，防止路径转义错误
        $vcpkgFindCUDA = "C:/vcpkg/scripts/buildsystems/vcpkg/FindCUDA.cmake"
        if (Test-Path $vcpkgFindCUDA) {
          Write-Host "Removing vcpkg FindCUDA hook: $vcpkgFindCUDA"
          Remove-Item $vcpkgFindCUDA -Force
        }
        
        # 重命名 CMake 自带的 FindCUDA，强制使用手动配置
        $cmakeFindCUDA = "C:/hostedtoolcache/windows/Python/3.10.11/x64/Lib/site-packages/cmake/data/share/cmake-3.28/Modules/FindCUDA.cmake"
        if (Test-Path $cmakeFindCUDA) {
          Write-Host "Disabling CMake FindCUDA module: $cmakeFindCUDA"
          Rename-Item $cmakeFindCUDA "FindCUDA.cmake.bak" -Force
        }
        
        # CUDA 12.4 不支持 compute_100-104 (RTX 50 系)，需要 CUDA 12.5+
        # 使用支持的架构：75, 80, 86, 89, 90
        # 手动配置 CUDA，不使用 FindCUDA 模块
        cmake .. `
          -G Ninja `
          -DUSE_CUDA=ON `
          -DCUDA_ARCHITECTURES="75;80;86;89;90" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CUDA_ARCHITECTURES="75;80;86;89;90" `
          -DCUDA_TOOLKIT_ROOT_DIR="${{ steps.cuda-toolkit.outputs.CUDA_PATH }}" `
          -DCUDA_TOOLKIT_INCLUDE_DIR="${{ steps.cuda-toolkit.outputs.CUDA_PATH }}/include" `
          -DCUDA_TOOLKIT_LIBRARY_DIR="${{ steps.cuda-toolkit.outputs.CUDA_PATH }}/lib/x64" `
          -DCUDA_NVCC_EXECUTABLE="${{ steps.cuda-toolkit.outputs.CUDA_PATH }}/bin/nvcc.exe" `
          -DCUDA_CUDA_COMPILER="${{ steps.cuda-toolkit.outputs.CUDA_PATH }}/bin/nvcc.exe" `
          -DCUDA_FOUND=TRUE `
          -DCUDA_VERSION="12.4" `
          -DFFMPEG_DIR="$ffmpegRoot" `
          -DFFMPEG_INCLUDE_DIR="$ffmpegInclude" `
          -DFFMPEG_LIB_DIR="$ffmpegLib" `
          -DFFMPEG_libavformat_LIBRARY="$ffmpegLib/avformat.lib" `
          -DFFMPEG_libavcodec_LIBRARY="$ffmpegLib/avcodec.lib" `
          -DFFMPEG_libavutil_LIBRARY="$ffmpegLib/avutil.lib" `
          -DFFMPEG_libavfilter_LIBRARY="$ffmpegLib/avfilter.lib" `
          -DFFMPEG_libswresample_LIBRARY="$ffmpegLib/swresample.lib" `
          -DFFMPEG_libavdevice_LIBRARY="$ffmpegLib/avdevice.lib"
      shell: pwsh
    

    
    - name: Build Python wheel
      run: |
        cd python
        python setup.py bdist_wheel --plat-name win_amd64
      shell: pwsh
    
    - name: Verify wheel
      run: |
        cd python/dist
        dir *.whl
        python -m pip install --force-reinstall decord*.whl
        python -c "import decord; print(f'Decord version: {decord.__version__}')"
        python -c "import decord.bridge as bridge; bridge.set_bridge('native'); print('Bridge set to native successfully')"
        python -c "import decord.bridge as bridge; bridge.set_bridge('numpy'); print('Bridge set to numpy successfully')"
        python -c "import importlib.util; import decord.bridge as bridge; has_torch = importlib.util.find_spec('torch') is not None; print(f'torch installed: {has_torch}'); bridge.set_bridge('torch') if has_torch else print('skip torch bridge check (torch not installed)')"
      shell: pwsh
    
    - name: Upload wheel artifact
      if: ${{ inputs.upload_artifact }}
      uses: actions/upload-artifact@v4
      with:
        name: decord-${{ env.DECORD_VERSION }}-cuda-${{ env.CUDA_VERSION }}-py${{ env.PYTHON_VERSION }}-win_amd64
        path: python/dist/*.whl
        retention-days: 30
    
    - name: Create release notes
      if: ${{ inputs.upload_artifact }}
      run: |
        echo "## Decord CUDA Build Information" > release_notes.md
        echo "" >> release_notes.md
        echo "- **Decord Version**: ${{ env.DECORD_VERSION }}" >> release_notes.md
        echo "- **CUDA Version**: ${{ env.CUDA_VERSION }}" >> release_notes.md
        echo "- **Python Version**: ${{ env.PYTHON_VERSION }}" >> release_notes.md
        echo "- **Platform**: Windows x64" >> release_notes.md
        echo "- **Build Date**: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> release_notes.md
        echo "" >> release_notes.md
        echo "## Features" >> release_notes.md
        echo "- ✅ CUDA GPU decoding support" >> release_notes.md
        echo "- ✅ Compatible with CUDA ${{ env.CUDA_VERSION }}" >> release_notes.md
        echo "- ✅ Supports GPU architectures: 75, 80, 86, 89, 90 (RTX 20/30/40 series and H100)" >> release_notes.md
        echo "- ✅ Torch bridge check (only when torch is installed)" >> release_notes.md
        echo "" >> release_notes.md
        echo "## Installation" >> release_notes.md
        echo '```powershell' >> release_notes.md
        echo 'pip install decord*.whl' >> release_notes.md
        echo '```' >> release_notes.md
        echo "" >> release_notes.md
        echo "## Compatibility" >> release_notes.md
        echo "- Requires NVIDIA GPU with CUDA support" >> release_notes.md
        echo "- Requires CUDA runtime ${{ env.CUDA_VERSION }} or compatible driver" >> release_notes.md
        echo "- Python ${{ env.PYTHON_VERSION }}.x" >> release_notes.md
        echo "- NumPy 2.2.6 (compatible with local environment)" >> release_notes.md
      shell: pwsh
    
    - name: Upload release notes
      uses: actions/upload-artifact@v4
      with:
        name: release-notes
        path: release_notes.md
        retention-days: 30
